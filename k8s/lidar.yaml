apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidar-sim
  labels:
    app: lidar-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lidar-sim
  template:
    metadata:
      labels:
        app: lidar-sim
    spec:
      containers:
        - name: lidar-sim
          image: sensor-fusion/lidar-sim:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MQTT_BROKER_HOST
              value: "mosquitto"
            - name: PUBLISH_RATE_HZ
              value: "10.0"
            - name: CRASH_ENDPOINT_ENABLED
              value: "false"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

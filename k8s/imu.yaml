apiVersion: apps/v1
kind: Deployment
metadata:
  name: imu-sim
  labels:
    app: imu-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imu-sim
  template:
    metadata:
      labels:
        app: imu-sim
    spec:
      containers:
        - name: imu-sim
          image: sensor-fusion/imu-sim:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MQTT_BROKER_HOST
              value: "mosquitto"
            - name: PUBLISH_RATE_HZ
              value: "100.0"
            - name: CRASH_ENDPOINT_ENABLED
              value: "false"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "40m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
